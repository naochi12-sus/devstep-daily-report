name: Vitest Unit Tests
on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: npm install
            - name: Run Vitest
              run: npm run test # もしくは npx vitest run
